# Compose file for running claude-tower tests in containers.
#
# Single `tests` service used by every target. Arguments to `docker compose run`
# go to the entrypoint, so `run --rm tests scenarios` works the same as
# `docker run ... claude-tower-test scenarios`.
#
# The project tree is mounted read-only so test edits are visible without
# rebuilding the image.

services:
  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: claude-tower-test
    volumes:
      - ./tests:/app/tests:ro
      - ./tmux-plugin:/app/tmux-plugin:ro
      - ./Makefile:/app/Makefile:ro
    environment:
      - CLAUDE_TOWER_DEBUG=${CLAUDE_TOWER_DEBUG:-0}
    # No `command:` — Dockerfile's default CMD (`all`) applies, and any
    # extra argument passed via `docker compose run` overrides it.
