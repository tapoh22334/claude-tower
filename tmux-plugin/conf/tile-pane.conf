# tile-pane.conf - Configuration for nested tmux clients inside Tile View panes.
#
# Tile View arranges multiple Claude sessions as native tmux split panes.
# Each pane runs `tmux attach-session -t tower_X` with this config so:
#
#   - Keys typed in the pane go straight to Claude (no inner prefix).
#   - Escape is NOT consumed (the user might genuinely want Escape in Claude).
#   - The outer tmux (session server) still owns prefix-based commands like
#     `prefix+arrow` for pane navigation and `prefix+t` to leave Tile.
#
# This file diverges from view-focus.conf only in that we do NOT bind Escape
# to detach — in Navigator the Escape-detach was the only way out of input
# mode; in Tile, prefix+t is the way out and Escape stays available for
# Claude to consume.

# ============================================================================
# Prefix Configuration
# ============================================================================

# Disable prefix entirely - all keys pass through to the inner session.
set -g prefix None
set -g prefix2 None
unbind-key -a

# ============================================================================
# Visual Settings
# ============================================================================

# Hide status bar; the outer tmux's status (if any) is enough.
set -g status off

# No visual activity indicators.
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off

# ============================================================================
# Behavior Settings
# ============================================================================

# Mouse is handled by the outer tmux (which owns pane focus).
set -g mouse off

# Fast escape time.
set -sg escape-time 0

# Don't rename windows.
setw -g automatic-rename off
setw -g allow-rename off

# ============================================================================
# Compatibility
# ============================================================================

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
